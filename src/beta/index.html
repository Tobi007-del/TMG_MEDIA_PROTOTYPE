<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMG Media Player</title>
    <link rel="icon" type="image/x-icon" href="../../favicon.ico" />
    <style>
      html {
        scroll-behavior: smooth;
        background-color: rgb(10, 10, 10);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        --tmg-video-font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 300vh;
      }
      .container {
        position: relative;
        padding-top: 50px;
        color: white;
      }
      .container > h2 {
        margin-top: 0;
        text-align: center;
      }
    </style>
    <link rel="stylesheet" href="index-video.css" />
    <script src="index.js" defer></script>
    <script src="Test.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h2>Single Media</h2>
      <video poster="../../assets/images/justice-league-b.jpeg" tmgcontrols muted src="../../assets/media/justice_league_preview.mp4" type="video/mp4" tmg--media--title="Justice League Teaser" tmg--settings--time--previews--address="../../assets/images/previews/preview$.jpg" tmg--settings--time--previews--spf="10" tmg--settings--overlay--behavior="persistent" class="tmg-media">
        <!-- <track default kind="captions" src="../assets/subtitles/test-captions-ultimate.vtt" /> -->
        <track kind="subtitles" srclang="en" src="../../assets/subtitles/justice_league_preview.vtt" label="English" />
      </video>
    </div>
    <div class="container">
      <h2>Media Playlist</h2>
      <video muted type="video/mp4" tmg--media--artist="TMG Media Prototype" tmg--media--profile="../../assets/icons/tmg-icon.jpeg" tmg--media--links--artist="../" tmg--media--links--profile="https://github.com/Tobi007-del/tmg-media-player" tmg--settings--overlay--behavior="persistent" class="tmg-media"></video>
    </div>
    <button type="button" id="beta-time-travel" onclick="__betaTimeTravel()" style="position: fixed; bottom: 0; right: 0; z-index: 9999">Time travel?</button>
    <script>
      function __betaTimeTravel() {
        window.tmg?.Controllers && (window.tmg.timeTravel(), document.getElementById("beta-time-travel")?.remove());
      }
    </script>
  </body>
</html>
